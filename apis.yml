aid: covariant
name: Covariant
description: >-
  Covariant is an Emeryville, California warehouse-robotics AI company founded
  in 2017 (originally as Embodied Intelligence) by UC Berkeley professor
  Pieter Abbeel and his former students Peter Chen, Rocky Duan, and Tianhao
  Zhang. The company builds the Covariant Brain, a universal AI platform that
  enables industrial picking robots to handle virtually any SKU regardless of
  shape, size, or packaging, and in March 2024 it introduced RFM-1
  (Robotics Foundation Model 1), an 8-billion-parameter multimodal transformer
  trained on text, images, video, robot actions, and numerical sensor
  readings to give robots human-like reasoning over the physical world.
  Covariant ships AI-powered solutions for order picking, sortation, item
  induction, kitting, depalletization, and goods-to-person workflows,
  delivered through long-running integration partnerships with KNAPP
  (Pick-it-Easy Robot, since 2020) and ABB (warehouse robotics, since 2020),
  as well as deployments with retailers and logistics providers worldwide.
  In August 2024, Amazon announced a non-exclusive license to Covariant's
  robotic foundation models and hired its three co-founders along with
  roughly a quarter of its workforce in a reverse-acquihire arrangement;
  Covariant continues to operate independently under COO-turned-CEO Ted
  Stinson and co-founder Tianhao Zhang. The Covariant Brain and RFM-1 are
  proprietary, deployed on-premise on partner robotics hardware, and the
  company has no public developer API, SDK, open-source release, or
  third-party developer program.
